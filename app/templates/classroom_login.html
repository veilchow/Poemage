<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>教师端登录</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      display: grid;
      place-items: center;
      min-height: 100vh;
      margin: 0;
      background: #f6f7f8;
      color: #20242a;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
    }

    .panel {
      width: 360px;
      border: 1px solid #dfe3e7;
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 16px 42px rgba(31, 35, 40, 0.1);
      padding: 28px;
    }

    h1 {
      margin: 0 0 22px;
      font-size: 20px;
      line-height: 1.3;
    }

    label {
      display: block;
      margin: 14px 0 6px;
      color: #6f7782;
      font-size: 13px;
      font-weight: 600;
    }

    input {
      width: 100%;
      height: 40px;
      border: 1px solid #dfe3e7;
      border-radius: 6px;
      padding: 0 12px;
      font: inherit;
      outline: none;
    }

    button {
      width: 100%;
      height: 40px;
      margin-top: 20px;
      border: 0;
      border-radius: 6px;
      background: #24272c;
      color: white;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    .message {
      min-height: 20px;
      margin-top: 12px;
      color: #d94d4d;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <form class="panel" id="loginForm">
    <h1>教师端登录</h1>
    <label for="username">账号</label>
    <input id="username" name="username" autocomplete="username" required>
    <label for="password">密码</label>
    <input id="password" name="password" type="password" autocomplete="current-password" required>
    <button type="submit">登录</button>
    <div class="message" id="message"></div>
  </form>

  <script>
    const form = document.getElementById('loginForm');
    const message = document.getElementById('message');

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      message.textContent = '';

      const response = await fetch('/api/login', {
        method: 'POST',
        credentials: 'same-origin',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          username: form.username.value.trim(),
          password: form.password.value,
        }),
      });

      if (response.ok) {
        window.location.href = '/api/classroom/teacher';
        return;
      }

      const data = await response.json().catch(() => ({message: '登录失败'}));
      message.textContent = data.message || '登录失败';
    });
  </script>
</body>
</html>
